<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bookstore</title>
</head>
<body>
<h1>Bookstore</h1>
<div th:if="${book}">
    <h2 th:text="${book.name}">Book Name</h2>
</div>
<ul th:if="${books}">
    <li th:each="b : ${books}" th:text="${b.name}">Book</li>
</ul>
</body>
</html>
