<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book List</title>
    <link th:href="@{/css/books.css}" rel="stylesheet">
<!--    <link th:href="@{/css/navbar.css}" rel="stylesheet">-->

</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<main class="books-page">
<div class="container">


    <div class="page-header">
        <h1 class="page-title">Our Collection</h1>
        <a th:href="@{/books/add}" class="btn-add-book">
            <span>+</span> Add New Book
        </a>

    </div>

    <div class="table-wrapper">
        <table class="books-table">
            <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}">Title</td>
                <td th:text="${book.author}">Author</td>
                <td>
                    <div class="action-buttons">
                        <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn-edit">Edit</a>

                        <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="_method" value="delete"/>
                            <button type="submit"
                                    class="btn-delete"
                                    onclick="return confirm('Are you sure you want to delete this book?')">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:if="${currentPage > 0}"
       th:href="@{/books(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
    <span th:if="${totalPages > 0}" th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
    <a th:href="@{/books(page=${i}, keyword=${keyword})}"
       th:text="${i + 1}"
       th:class="${currentPage == i} ? 'active' : ''"></a>
</span>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/books(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
</div>
</main>





</body>
</html>
