<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head >
    <meta charset="UTF-8">
    <title>Bookstore</title>
      <link th:href="@{/css/navbar.css}" rel="stylesheet">
      <link th:href="@{/css/base.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
<main>
    <section class="hero-section">
        <div class="section-center">
            <div class="hero-details">
                <h2 class="title">Most popular books</h2>
                <h3 class="subtitle"></h3>
                <p class="description">WELCOME TO THE BOOKSTORE!</p>

                <div class="buttons">
                    <a href="/books" class="button-order-now">Order now</a>
                    <a href="/books" class="button-contact-us">Contact us</a>
                </div>
            </div>
            <div class="hero-image-wrapper">
                <img src="images/book.png" alt="Book" class="hero-image">
            </div>
        </div>

    </section>
</main>


</body>
</html>
